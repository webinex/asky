name: CI

on:
  push:
    branches:
      - master
      - release/*
  pull_request:
    branches:
      - master
      - release/*

jobs:
  build-dotnet:
    name: Build & Test .NET
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: ./src/global.json

      - name: Restore
        working-directory: src
        run: dotnet restore Webinex.Asky.sln

      - name: Build
        working-directory: src
        run: dotnet build Webinex.Asky.sln --configuration Release --no-restore

      - name: Test
        working-directory: src
        run: dotnet test Webinex.Asky.Tests/Webinex.Asky.Tests.csproj --configuration Release --no-build --verbosity normal

  build-npm:
    name: Build Npm Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: yarn
          cache-dependency-path: src/Webinex.Asky.NpmPackage/yarn.lock

      - name: Install dependencies
        working-directory: src/Webinex.Asky.NpmPackage
        run: yarn install --frozen-lockfile

      - name: Build package
        working-directory: src/Webinex.Asky.NpmPackage
        run: yarn build
